<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us — ToolSphere</title>
    <link rel="canonical" href="https://toolsphere.online/contact.html" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .page-hero { padding: 60px 24px 30px; text-align: center; background: radial-gradient(ellipse at center, rgba(102,126,234,0.08), transparent 70%); }
        .page-hero h1 { font-size: 40px; font-weight: 800; }
        .page-hero p { color: rgba(255,255,255,0.5); margin-top: 8px; }
        .contact-form { max-width: 600px; margin: 0 auto; padding: 40px 0; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            color: #fff; font-size: 15px; font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #667eea; outline: none; box-shadow: 0 0 30px rgba(102,126,234,0.08);
        }
        .contact-form button {
            padding: 12px 32px; border: none; border-radius: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .contact-form button:hover { transform: scale(1.04); box-shadow: 0 8px 30px rgba(102,126,234,0.3); }
        .form-status { margin-top: 16px; font-weight: 500; }
        body.light-mode .form-group input, body.light-mode .form-group textarea {
            background: rgba(255,255,255,0.8); color: #1a1a2e; border-color: rgba(0,0,0,0.06);
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="logo"><i class="fas fa-cube"></i><span>ToolSphere</span></div>
            <div class="header-actions">
                <button id="themeToggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </header>

    <section class="page-hero">
        <div class="container">
            <h1>Contact Us</h1>
            <p>Have questions or suggestions? Reach out to us!</p>
        </div>
    </section>

    <section class="contact-section">
        <div class="container">
            <form class="contact-form" id="contactForm" onsubmit="return submitContact(event)">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="contactName" placeholder="Enter your name" required />
                </div>
                <div class="form-group">
                    <label>Your Email</label>
                    <input type="email" id="contactEmail" placeholder="Enter your email" required />
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="contactMessage" rows="5" placeholder="Write your message..." required></textarea>
                </div>
                <button type="submit">Send Message</button>
                <div id="contactStatus" class="form-status"></div>
            </form>
        </div>
    </section>

    <footer>
        <div class="container footer-container">
            <div class="footer-brand"><h3><i class="fas fa-cube"></i> ToolSphere</h3><p>50 free tools.</p></div>
            <div class="footer-links">
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
                <a href="blog.html">Blog</a>
                <a href="privacy-policy.html">Privacy</a>
                <a href="terms-of-use.html">Terms</a>
            </div>
        </div>
        <div class="footer-bottom"><p>&copy; 2026 ToolSphere. All rights reserved.</p></div>
    </footer>

    <script>
        async function submitContact(e) {
            e.preventDefault();
            const status = document.getElementById('contactStatus');
            status.textContent = 'Sending...';
            status.style.color = '#667eea';

            const data = {
                name: document.getElementById('contactName').value,
                email: document.getElementById('contactEmail').value,
                message: document.getElementById('contactMessage').value,
                type: 'contact'
            };

            try {
                const response = await fetch('https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.status === 'success') {
                    status.textContent = '✅ Message sent successfully!';
                    status.style.color = '#34d399';
                    document.getElementById('contactForm').reset();
                } else {
                    status.textContent = '❌ Something went wrong. Please try again.';
                    status.style.color = '#f87171';
                }
            } catch (error) {
                status.textContent = '❌ Error sending message. Please try again.';
                status.style.color = '#f87171';
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.querySelector('#themeToggle i');
            icon.className = document.body.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            document.querySelector('#themeToggle i').className = 'fas fa-sun';
        }
    </script>
</body>
</html>
